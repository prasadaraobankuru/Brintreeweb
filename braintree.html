<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Braintree Payment UI</title>

<script src="https://js.braintreegateway.com/web/3.129.0/js/client.min.js"></script>
<script src="https://js.braintreegateway.com/web/3.129.0/js/hosted-fields.min.js"></script>
<script src="https://js.braintreegateway.com/web/3.129.0/js/paypal-checkout.min.js"></script>

<style>
/* SAME YOUR DESIGN */
body {
  font-family: sans-serif;
  margin: 0;
  background: #fff;
}
.option {
  display: flex;
  flex-direction: column;
  padding: 8px;
  margin-bottom: 6px;
}
.expand-section {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
}
.expand-section.active {
  max-height: 500px;
}
.hosted-field {
  height: 28px;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px;
  background: #fff;
}
button {
  padding: 12px;
  width: 100%;
  background: #00539b;
  color: white;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div style="padding: 8px">

<!-- CARD -->
<div class="option">
  <div onclick="selectOption('card')">
    <span>Card</span>
    <input type="radio" name="payment" id="radio-card" />
  </div>

  <div id="card-section" class="expand-section">

    <div id="cardholder-name" class="hosted-field"></div>
    <br/>
    <div id="card-number" class="hosted-field"></div>
    <br/>
    <div id="cvv" class="hosted-field"></div>
    <br/>
    <div id="expiration-date" class="hosted-field"></div>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="tokenizeCard()">Pay with Card</button>

  </div>
</div>

<!-- PAYPAL -->
<div class="option">
  <div onclick="selectOption('paypal')">
    <span>PayPal</span>
    <input type="radio" name="payment" id="radio-paypal" />
  </div>

  <div id="paypal-section" class="expand-section">
    <div id="paypal-button"></div>
  </div>
</div>

</div>

<script>

let hostedFieldsInstance;

// ✅ STATIC TOKEN (TEST ONLY)
const clientToken = "sandbox_38zsjnr9_ydwkdrfr4jvvhf98";

// ✅ REDIRECT
function redirectToApp(status, nonce) {
  window.location.href =
    "myapp://payment-result?status=" +
    encodeURIComponent(status) +
    "&nonce=" +
    encodeURIComponent(nonce || "");
}

// UI toggle
function selectOption(type) {
  document.getElementById("radio-card").checked = type === "card";
  document.getElementById("radio-paypal").checked = type === "paypal";

  document.getElementById("card-section").classList.toggle("active", type === "card");
  document.getElementById("paypal-section").classList.toggle("active", type === "paypal");
}

// INIT
window.onload = function () {
  initBraintree();
};

function initBraintree() {

  braintree.client.create({
    authorization: clientToken
  }, function (err, clientInstance) {

    if (err) {
      console.error(err);
      return;
    }

    // ======================
    // CARD
    // ======================
    braintree.hostedFields.create({
      client: clientInstance,
      fields: {
        number: { selector: '#card-number' },
        expirationDate: { selector: '#expiration-date' },
        cvv: { selector: '#cvv' },
        cardholderName: { selector: '#cardholder-name' }
      }
    }, function (err, hfInstance) {
      if (err) {
        console.error(err);
        return;
      }
      hostedFieldsInstance = hfInstance;
    });

    // ======================
    // PAYPAL
    // ======================
    braintree.paypalCheckout.create({
      client: clientInstance
    }, function (err, paypalCheckoutInstance) {

      if (err) {
        console.error(err);
        return;
      }

      paypalCheckoutInstance.loadPayPalSDK(function () {

        paypal.Buttons({

          createOrder: function () {
            return paypalCheckoutInstance.createPayment({
              flow: 'checkout',
              amount: '1.00',
              currency: 'USD'
            });
          },

          onApprove: function (data) {
            return paypalCheckoutInstance.tokenizePayment(data, function (err, payload) {

              if (err) {
                redirectToApp("failed", "");
                return;
              }

              redirectToApp("success", payload.nonce);
            });
          },

          onCancel: function () {
            redirectToApp("cancel", "");
          },

          onError: function () {
            redirectToApp("failed", "");
          }

        }).render('#paypal-button');

      });

    });

  });
}

// CARD PAYMENT
function tokenizeCard() {

  if (!hostedFieldsInstance) {
    alert("Card not ready");
    return;
  }

  hostedFieldsInstance.tokenize(function (err, payload) {

    if (err) {
      alert("Invalid card details");
      return;
    }

    redirectToApp("success", payload.nonce);
  });
}

</script>

</body>
</html>
